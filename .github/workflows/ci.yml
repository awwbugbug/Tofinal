name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  frontend:
    name: Type-check & test
    # Runs on Windows to match the platform this app targets and the platform
    # the committed package-lock.json is generated on. npm omits other-OS
    # optional deps from the lockfile (e.g. Tailwind's Linux WASM engine pulls
    # @emnapi/*), so a Linux runner's `npm ci` fails against a Windows lockfile.
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npx tsc --noEmit

      - name: Run tests
        run: npm test
